<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner | AI Assistant</title>
    <style>
        :root {
            --primary: #f97316;
            --dark: #0f172a;
            --text: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Cool travel image with a subtle dark overlay for depth */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('../static/home_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--dark);
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.95); /* Slight transparency */
            backdrop-filter: blur(10px); /* Blurs the background behind the card */
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 85%;
            transition: transform 0.2s ease;
        }

        .hero-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn-explore {
            display: block;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-explore:hover {
            filter: brightness(90%);
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
        }

        .btn-explore:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <span class="icon-box">✈️</span>
        <h2>Explore the world<br>with AI</h2>
        <p>Your personal concierge for custom itineraries and hidden gems.</p>
        
        <a href="/bot" class="btn-explore">Start My Journey</a>
    </div>

</body>
</html>
